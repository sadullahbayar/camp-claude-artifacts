<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camp Artifacts - Hoşgeldin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #71717a;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back-link:hover { color: #a1a1aa; }

    .emoji { font-size: 4rem; margin-bottom: 24px; }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    p {
      color: #a1a1aa;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .features {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 20px;
      width: 180px;
      text-align: center;
    }

    .feature .icon { font-size: 1.5rem; margin-bottom: 8px; }
    .feature h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .feature p { font-size: 0.75rem; color: #71717a; }
  </style>
</head>
<body>
  <a href="/brands/demo/" class="back-link">← Demo Marka</a>

  <div class="emoji">🏕️</div>
  <h1>Camp Artifacts</h1>
  <p>HTML artifactleri, mini uygulamaları ve raporları ekibinizle paylaşın.</p>

  <div class="features">
    <div class="feature">
      <div class="icon">📊</div>
      <h3>Raporlar</h3>
      <p>Interaktif HTML raporları</p>
    </div>
    <div class="feature">
      <div class="icon">🎨</div>
      <h3>Artifactler</h3>
      <p>Claude ile oluşturulan çıktılar</p>
    </div>
    <div class="feature">
      <div class="icon">⚡</div>
      <h3>Mini Appler</h3>
      <p>Basit frontend araçları</p>
    </div>
  </div>
</body>
</html>
