<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e4e4e7;
      min-height: 100vh;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid #1e1e2a;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      color: #71717a;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .back-btn:hover { color: #a1a1aa; }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 1.4rem; font-weight: 700; }
    .header-info p { color: #71717a; font-size: 0.85rem; margin-top: 2px; }

    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .artifacts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .artifact-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.15s ease;
    }

    .artifact-card:hover {
      border-color: #3f3f46;
      background: #1c1c20;
    }

    .artifact-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .artifact-info p {
      color: #71717a;
      font-size: 0.8rem;
    }

    .artifact-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #52525b;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .tag {
      background: #27272a;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .arrow {
      color: #3f3f46;
      font-size: 1.2rem;
    }

    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #52525b;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back-btn">← Markalar</a>
    <div class="brand-badge" id="brand-badge"></div>
    <div class="header-info">
      <h1 id="brand-name">Yükleniyor...</h1>
      <p id="brand-desc"></p>
    </div>
  </div>

  <div class="container">
    <div class="artifacts-list" id="artifacts-list"></div>
    <div class="empty" id="empty" style="display:none;">
      <p>Bu markada henüz artifact yok.</p>
    </div>
  </div>

  <script>
    async function load() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const brandSlug = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

      const res = await fetch('/brands/brands.json');
      const data = await res.json();
      const brand = data.brands.find(b => b.slug === brandSlug);

      if (!brand) {
        document.getElementById('brand-name').textContent = 'Marka bulunamadı';
        return;
      }

      document.title = `${brand.name} - Camp Artifacts`;
      document.getElementById('brand-name').textContent = brand.name;
      document.getElementById('brand-desc').textContent = brand.description || '';

      const badge = document.getElementById('brand-badge');
      badge.style.background = `${brand.color}20`;
      badge.style.color = brand.color;
      badge.textContent = brand.icon || '📦';

      const list = document.getElementById('artifacts-list');
      const empty = document.getElementById('empty');

      if (!brand.artifacts || brand.artifacts.length === 0) {
        empty.style.display = 'block';
        return;
      }

      brand.artifacts.forEach(art => {
        const a = document.createElement('a');
        a.className = 'artifact-card';
        a.href = `/brands/${brand.slug}/artifacts/${art.slug}/`;

        const tags = (art.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
        a.innerHTML = `
          <div class="artifact-info">
            <h3>${art.name}</h3>
            <p>${art.description || ''}</p>
          </div>
          <div class="artifact-meta">
            ${tags}
            <span>${art.date || ''}</span>
            <span class="arrow">→</span>
          </div>
        `;
        list.appendChild(a);
      });
    }

    load();
  </script>
</body>
</html>
